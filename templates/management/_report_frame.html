<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0"><i class="fas fa-chart-bar"></i> {{ report.title }}</h3>
  <a class="btn btn-outline-primary btn-sm" href="{{ url_for('management_dashboard') }}">Back to Management Home</a>
</div>

<div class="card mb-3">
  <div class="card-header">
    <div class="row g-2">
      <div class="col-md-2"><select id="f-year" class="form-select"><option value="">All Years</option></select></div>
      <div class="col-md-2"><select id="f-term" class="form-select"><option value="">All Terms</option></select></div>
      <div class="col-md-2"><select id="f-phase" class="form-select"><option value="">All Phases</option></select></div>
      <div class="col-md-2"><select id="f-grade" class="form-select"><option value="">All Grades</option></select></div>
      <div class="col-md-2"><select id="f-subject" class="form-select" {% if disable_subject_filter %}disabled{% endif %}><option value="">All Subjects</option></select></div>
      <div class="col-md-2"><button id="apply-filters" class="btn btn-light w-100">Apply</button></div>
    </div>
  </div>
</div>
