{% extends "base.html" %}
{% block title %}{{ report.title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">{{ report.title }}</h3>
  <a class="btn btn-outline-primary btn-sm" href="{{ url_for('management_dashboard') }}">Back</a>
</div>
<div class="card mb-3"><div class="card-body">
  <div class="row g-2">
    <div class="col-md-2"><select id="f-year" class="form-select form-select-sm"></select></div>
    <div class="col-md-2"><select id="f-term" class="form-select form-select-sm"></select></div>
    <div class="col-md-2"><select id="f-grade" class="form-select form-select-sm"><option value="">All Grades</option></select></div>
    <div class="col-md-4"><select id="f-subject" class="form-select form-select-sm"><option value="">All Subjects</option></select></div>
    <div class="col-md-2"><button id="apply" class="btn btn-primary btn-sm w-100">Apply</button></div>
  </div>
</div></div>
<div id="meta" class="small text-muted mb-2"></div>
<div id="host"></div>
{% endblock %}
{% block extra_js %}
<script>
function qp(){const p=new URLSearchParams();["year","term","grade"].forEach(k=>{const v=(document.getElementById(`f-${k}`)?.value||"").trim();if(v)p.set(k,v)});const s=(document.getElementById("f-subject").value||"").trim();if(s)p.set("subject",s);return p;}
function bandsRow(r){return `<tr><td>${r.termLabel||""}</td><td>${r.level1||0}</td><td>${r.level2||0}</td><td>${r.level3||0}</td><td>${r.level4||0}</td><td>${r.level5||0}</td><td>${r.level6||0}</td><td>${r.level7||0}</td><td>${r.totalLearners||0}</td><td>${Number(r.averagePct||0).toFixed(2)}</td><td>${r.absentCount||0}</td><td>${r.meetingRequirements||0}</td><td>${r.notMeetingRequirements||0}</td><td>${Number(r.meetingRequirementsPct||0).toFixed(2)}%</td></tr>`}
async function load(){
  const f = await (await fetch('/api/management-report-filters')).json(); const years=f?.filters?.years||[]; const terms=f?.filters?.terms||[]; const grades=f?.filters?.grades||[]; const subjects=f?.filters?.subjects||[];
  const y=document.getElementById("f-year"), t=document.getElementById("f-term"), g=document.getElementById("f-grade"), s=document.getElementById("f-subject");
  if(!y.options.length){y.innerHTML=years.map(v=>`<option value="${v}">${v}</option>`).join(""); t.innerHTML=terms.map(v=>`<option value="${v}">Term ${v}</option>`).join(""); g.innerHTML='<option value="">All Grades</option>'+grades.map(v=>`<option value="${v}">Grade ${v}</option>`).join(""); s.innerHTML='<option value="">All Subjects</option>'+subjects.map(v=>`<option value="${v}">${v}</option>`).join("");}
  const d = await (await fetch(`/api/management-analysis?${qp().toString()}`)).json();
  document.getElementById("meta").textContent=`Year ${d.meta?.year||"-"} Term ${d.meta?.term||"-"}`;
  const host=document.getElementById("host");
  host.innerHTML=(d.blocks||[]).map(b=>`<div class="card mb-3"><div class="card-header fw-semibold">${b.subject||""} <span class="text-muted small">${b.gradeLabel||""}</span></div><div class="table-responsive"><table class="table table-sm table-bordered mb-0"><thead><tr><th>Term</th><th>L1</th><th>L2</th><th>L3</th><th>L4</th><th>L5</th><th>L6</th><th>L7</th><th>Total</th><th>Avg%</th><th>Absent</th><th>Meet</th><th>Not Meet</th><th>% Meet</th></tr></thead><tbody>${(b.rows||[]).map(bandsRow).join("")}</tbody></table></div></div>`).join("") || '<div class="text-muted">No data.</div>';
}
document.getElementById("apply").addEventListener("click", load); load();
</script>
{% endblock %}
