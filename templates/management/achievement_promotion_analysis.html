{% extends "base.html" %}
{% block title %}{{ report.title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h3 class="mb-0">{{ report.title }}</h3><a class="btn btn-outline-primary btn-sm" href="{{ url_for('management_dashboard') }}">Back</a></div>
<div class="card mb-3"><div class="card-body"><div class="row g-2"><div class="col-md-2"><select id="f-year" class="form-select form-select-sm"></select></div><div class="col-md-2"><select id="f-term" class="form-select form-select-sm"></select></div><div class="col-md-2"><select id="f-phase" class="form-select form-select-sm"><option value="">All Phases</option></select></div><div class="col-md-2"><button id="apply" class="btn btn-primary btn-sm w-100">Apply</button></div></div></div></div>
<div id="meta" class="small text-muted mb-2"></div><div id="host"></div>
{% endblock %}
{% block extra_js %}
<script>
async function load(){const u=new URLSearchParams();["year","term","phase"].forEach(k=>{const v=document.getElementById(`f-${k}`).value.trim();if(v)u.set(k,v);});const f=await(await fetch(`/api/management-report-filters?${u}`)).json();const y=document.getElementById("f-year"),t=document.getElementById("f-term"),ph=document.getElementById("f-phase");const sy=y.value,st=t.value,sp=ph.value;y.innerHTML=(f?.filters?.years||[]).map(v=>`<option value="${v}">${v}</option>`).join("");t.innerHTML=(f?.filters?.terms||[]).map(v=>`<option value="${v}">Term ${v}</option>`).join("");ph.innerHTML='<option value="">All Phases</option>'+(f?.filters?.phases||[]).map(v=>`<option value="${v}">${v}</option>`).join("");if(sy&&[...y.options].some(o=>o.value===sy))y.value=sy;if(st&&[...t.options].some(o=>o.value===st))t.value=st;if(sp&&[...ph.options].some(o=>o.value===sp))ph.value=sp;const q=new URLSearchParams();if(y.value)q.set("year",y.value);if(t.value)q.set("term",t.value);if(ph.value)q.set("phase",ph.value);const d=await (await fetch(`/api/management-achievement-promotion-analysis?${q}`)).json();
document.getElementById("meta").textContent=`Year ${d.meta?.year||"-"} Term ${d.meta?.term||"-"}`;
const rows=(d.rows||[]);const totals=d.totals||{};const cells=(r)=>`<td>${r.notMeetMaleCount||0}</td><td>${(r.notMeetMalePct||0).toFixed(2)}</td><td>${r.notMeetFemaleCount||0}</td><td>${(r.notMeetFemalePct||0).toFixed(2)}</td><td>${r.notMeetTotalCount||0}</td><td>${(r.notMeetTotalPct||0).toFixed(2)}</td><td>${r.progressMaleCount||0}</td><td>${(r.progressMalePct||0).toFixed(2)}</td><td>${r.progressFemaleCount||0}</td><td>${(r.progressFemalePct||0).toFixed(2)}</td><td>${r.progressTotalCount||0}</td><td>${(r.progressTotalPct||0).toFixed(2)}</td><td>${r.meetMaleCount||0}</td><td>${(r.meetMalePct||0).toFixed(2)}</td><td>${r.meetFemaleCount||0}</td><td>${(r.meetFemalePct||0).toFixed(2)}</td><td>${r.meetTotalCount||0}</td><td>${(r.meetTotalPct||0).toFixed(2)}</td><td>${r.grandMaleCount||0}</td><td>${(r.grandMalePct||0).toFixed(2)}</td><td>${r.grandFemaleCount||0}</td><td>${(r.grandFemalePct||0).toFixed(2)}</td><td>${r.grandTotalCount||0}</td>`;
document.getElementById("host").innerHTML=`<div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Grade</th><th colspan="6">Not Meeting</th><th colspan="6">Progressing</th><th colspan="6">Meeting</th><th colspan="5">Grand Total</th></tr><tr><th></th><th colspan="2">Male</th><th colspan="2">Female</th><th colspan="2">Total</th><th colspan="2">Male</th><th colspan="2">Female</th><th colspan="2">Total</th><th colspan="2">Male</th><th colspan="2">Female</th><th colspan="2">Total</th><th colspan="2">Male</th><th colspan="2">Female</th><th>Total #</th></tr><tr><th></th>${'<th>#</th><th>%</th>'.repeat(11)}<th>#</th></tr></thead><tbody>${rows.map(r=>`<tr><td>Grade ${r.grade}</td>${cells(r)}</tr>`).join("")}<tr class="fw-semibold"><td>Totals</td>${cells(totals)}</tr></tbody></table></div>`;}
document.getElementById("apply").addEventListener("click",load);load();
</script>
{% endblock %}
