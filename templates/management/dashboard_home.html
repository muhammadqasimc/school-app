{% extends "base.html" %}
{% block title %}Management Reports{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/management-reports.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0"><i class="fas fa-chart-line"></i> Management Reports</h3>
</div>

<div class="card border-0 shadow-sm report-card-accent-primary">
  <div class="card-header">
    <h5 class="mb-0">Management Reports</h5>
  </div>
  <div class="card-body">
    <div class="row g-2 g-sm-3 row-cols-2 row-cols-sm-3 row-cols-lg-5">
      {% for report in reports %}
      <div class="col">
        <a class="text-decoration-none" href="{{ url_for('management_report', report_key=report.key) }}">
          <div class="mgt-tile">
            <i class="fas {{ report.icon }} tile-icon"></i>
            <h6 class="mb-0 text-dark">{{ report.title }}</h6>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
