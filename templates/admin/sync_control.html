{% extends "base.html" %}

{% block title %}Sync Control{% endblock %}

{% block content %}
<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="fas fa-sync-alt"></i> Sync Control</h3>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Admin</a>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                <button id="runSyncBtn" class="btn btn-primary">
                    <i class="fas fa-play"></i> Run Sync Now
                </button>
                <span id="syncStateBadge" class="badge bg-secondary">Idle</span>
            </div>

            <div class="mb-2 small text-muted" id="syncSummary">No sync run yet.</div>
            <div class="progress" style="height: 16px;">
                <div id="syncProgressBar" class="progress-bar" role="progressbar" style="width: 0%;">0%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="fas fa-list"></i> Live Logs</h5>
        </div>
        <div class="card-body p-0">
            <div id="syncLogs" class="p-3 sync-logs">
                <div class="text-muted">Waiting for sync activity...</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const runBtn = document.getElementById('runSyncBtn');
const badge = document.getElementById('syncStateBadge');
const summary = document.getElementById('syncSummary');
const bar = document.getElementById('syncProgressBar');
const logsEl = document.getElementById('syncLogs');

function csrfToken() {
    return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
}

function setProgress(done, total) {
    const safeTotal = total > 0 ? total : 1;
    const pct = Math.max(0, Math.min(100, Math.round((done / safeTotal) * 100)));
    bar.style.width = `${pct}%`;
    bar.textContent = `${pct}%`;
}

function renderLogs(logs) {
    const arr = Array.isArray(logs) ? logs : [];
    if (!arr.length) {
        logsEl.innerHTML = '<div class="text-muted">No logs yet.</div>';
        return;
    }
    logsEl.innerHTML = arr.map(l => {
        const level = String(l.level || 'info').toUpperCase();
        const ts = String(l.timestamp || '');
        const msg = String(l.message || '');
        const cls = level === 'ERROR' ? 'text-danger' : (level === 'WARNING' ? 'text-warning' : 'text-body');
        return `<div class="${cls}">[${ts}] [${level}] ${msg}</div>`;
    }).join('');
    logsEl.scrollTop = logsEl.scrollHeight;
}

function applyState(s) {
    const running = !!s.running;
    const done = Number(s.completed_tables || 0);
    const total = Number(s.total_tables || 0);
    runBtn.disabled = running;
    badge.className = `badge ${running ? 'bg-success' : 'bg-secondary'}`;
    badge.textContent = running ? 'Running' : 'Idle';
    const current = s.current_table ? ` | Current: ${s.current_table}` : '';
    const err = s.last_error ? ` | Last error: ${s.last_error}` : '';
    summary.textContent = `Completed ${done}/${total}${current}${err}`;
    setProgress(done, total);
    renderLogs(s.logs || []);
}

async function loadStatus() {
    try {
        const r = await fetch('/admin/sync-control/status');
        const s = await r.json();
        applyState(s || {});
    } catch (_) {}
}

runBtn?.addEventListener('click', async () => {
    runBtn.disabled = true;
    try {
        const fd = new FormData();
        fd.append('csrf_token', csrfToken());
        const r = await fetch('/admin/sync-control/start', { method: 'POST', body: fd });
        const j = await r.json();
        if (!r.ok || j.error) {
            alert(j.error || 'Failed to start sync.');
        }
    } catch (_) {
        alert('Failed to start sync.');
    } finally {
        setTimeout(loadStatus, 300);
    }
});

loadStatus();
setInterval(loadStatus, 2000);
</script>
{% endblock %}
