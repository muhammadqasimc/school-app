{% extends "base.html" %}

{% block title %}Set Password - Parent Portal{% endblock %}

{% block content %}
<style>
    :root { --teal: #24bfd1; --teal-soft: #d5eef3; --text-main: #2f3e46; --border-soft: #e7e7e7; }
    .auth-shell .card { border: 1px solid var(--border-soft); border-radius: 12px; overflow: hidden; box-shadow: none; }
    .auth-shell .card-header { background: var(--teal-soft); color: var(--text-main); border-bottom: 1px solid var(--border-soft); font-weight: 700; }
    .auth-shell .btn-primary { background-color: var(--teal); border-color: var(--teal); }
    .auth-shell .btn-primary:hover, .auth-shell .btn-primary:focus { background-color: #1ea3b3; border-color: #1ea3b3; }
</style>
<div class="row justify-content-center mt-5 auth-shell">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-lock"></i> Create Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    Creating account for <strong>{{ phone }}</strong>. Please create a password.
                </p>

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="new_password" class="form-label"><i class="fas fa-key"></i> Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required minlength="8">
                        <small class="form-text text-muted">Min 8 characters, upper, lower, number, special character</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label"><i class="fas fa-check"></i> Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-user-check"></i> Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
