{% extends "base.html" %}

{% block title %}Register - Parent Portal{% endblock %}

{% block content %}
<style>
    :root { --teal: #24bfd1; --teal-soft: #d5eef3; --text-main: #2f3e46; --border-soft: #e7e7e7; }
    .auth-shell .card { border: 1px solid var(--border-soft); border-radius: 12px; overflow: hidden; box-shadow: none; }
    .auth-shell .card-header { background: var(--teal-soft); color: var(--text-main); border-bottom: 1px solid var(--border-soft); font-weight: 700; }
    .auth-shell .btn-primary { background-color: var(--teal); border-color: var(--teal); }
    .auth-shell .btn-primary:hover, .auth-shell .btn-primary:focus { background-color: #1ea3b3; border-color: #1ea3b3; }
</style>
<div class="row justify-content-center mt-5 auth-shell">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-user-plus"></i> Register</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    Enter your cellphone number. We’ll verify it against the school records and send you an OTP.
                </p>

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="phone" class="form-label"><i class="fas fa-phone"></i> Cellphone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+2782XXXXXXX" required autofocus>
                        <small class="form-text text-muted">Tip: Use international format, e.g. +27…</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-sms"></i> Send OTP
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{{ url_for('login') }}" class="text-muted">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
