{% extends "base.html" %}

{% block title %}Register - Parent Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-user-plus"></i> Register</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">
                    Enter your cellphone number. We'll verify it against the school records and send you an OTP.
                </p>

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="phone" class="form-label"><i class="fas fa-phone"></i> Cellphone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+2782XXXXXXX" required autofocus>
                        <small class="form-text text-muted">Tip: Use international format, e.g. +27…</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sms"></i> Send OTP
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{{ url_for('login') }}" class="text-muted small">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
