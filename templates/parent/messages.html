{% extends "base.html" %}
{% block title %}Parent Chat{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h4 class="mb-0">Parent Chat</h4></div>
  <div class="card-body">
    <div class="mb-2 d-flex gap-2">
      <input id="chat-search" class="form-control form-control-sm" placeholder="Search educators/management">
      <button class="btn btn-sm btn-outline-primary" id="chat-refresh">Refresh</button>
    </div>
    <div class="border rounded p-2 mb-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-5">
          <label class="form-label small mb-1" for="candidate-user">Start thread with user</label>
          <select id="candidate-user" class="form-select form-select-sm"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small mb-1" for="thread-learner">Learner ID (required)</label>
          <input id="thread-learner" class="form-control form-control-sm" placeholder="Learner ID">
        </div>
        <div class="col-md-2">
          <button id="create-thread" class="btn btn-sm btn-primary w-100">Start</button>
        </div>
      </div>
    </div>
    {% include "_chat_base.html" %}
  </div>
</div>
{% endblock %}
