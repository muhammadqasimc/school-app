{% extends "base.html" %}
{% block title %}Teacher Set Password{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h4 class="mb-0">Set Teacher Password - {{ educator_id }}</h4></div>
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="form-label">New password</label>
      <input class="form-control" type="password" name="new_password" required minlength="8">
      <label class="form-label mt-2">Confirm password</label>
      <input class="form-control" type="password" name="confirm_password" required minlength="8">
      <button class="btn btn-primary mt-3" type="submit">Save Password</button>
    </form>
  </div>
</div>
{% endblock %}
