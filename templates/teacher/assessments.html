{% extends "base.html" %}
{% block title %}Teacher Assessments{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h4 class="mb-0">Assessments</h4></div>
  <div class="card-body">
    <form id="assessment-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-2">
        <div class="col-md-2"><input class="form-control" name="academic_year" value="2026" placeholder="Year"></div>
        <div class="col-md-1"><input class="form-control" name="term" value="1" placeholder="Term"></div>
        <div class="col-md-2"><input class="form-control" name="learner_id" placeholder="Learner ID" required></div>
        <div class="col-md-3"><select class="form-select" id="subject_id" name="subject_id" required></select></div>
        <div class="col-md-1"><input class="form-control" type="number" name="mark" placeholder="Mark" required></div>
        <div class="col-md-1"><input class="form-control" type="number" name="total_mark" value="100"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Save</button></div>
      </div>
    </form>
    <div id="assessment-msg" class="small mt-2"></div>
    <hr>
    <button id="load-assessments" class="btn btn-outline-secondary btn-sm mb-2">Reload Assessments</button>
    <div class="table-responsive">
      <table class="table table-sm table-striped"><thead><tr><th>Learner</th><th>Subject</th><th>Mark</th><th>Total</th><th>Year</th><th>Report</th></tr></thead><tbody id="assessment-body"></tbody></table>
    </div>
  </div>
</div>
<script>
async function loadAssessments() {
  const res = await fetch("{{ url_for('api_teacher_assessments') }}");
  if (!res.ok) return;
  const data = await res.json();
  const subj = document.getElementById("subject_id");
  if (subj && (!subj.options || subj.options.length === 0)) {
    subj.innerHTML = (data.subjects || []).map(s => `<option value="${s.Id}">${s.Name}</option>`).join("");
  }
  document.getElementById("assessment-body").innerHTML = (data.rows || []).map(r => `<tr><td>${r.LearnerID || ""}</td><td>${r.SubjectName || r.SubjectId || ""}</td><td>${r.Mark ?? ""}</td><td>${r.TotalMark ?? ""}</td><td>${r.Datayear || ""}</td><td>${r.ReportId || ""}</td></tr>`).join("");
}
document.getElementById("assessment-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  fd.set("idempotency_key", crypto.randomUUID());
  const res = await fetch("{{ url_for('api_teacher_assessments_save') }}", {method:"POST", body:fd});
  const data = await res.json();
  document.getElementById("assessment-msg").textContent = data.message || data.error || "Done";
  if (res.ok) loadAssessments();
});
document.getElementById("load-assessments").addEventListener("click", loadAssessments);
loadAssessments();
</script>
{% endblock %}
