{% extends "base.html" %}
{% block title %}Teacher Attendance{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h4 class="mb-0">Attendance</h4></div>
  <div class="card-body">
    <form id="attendance-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-2">
        <div class="col-md-2"><input class="form-control" name="academic_year" placeholder="Academic year" value="2026"></div>
        <div class="col-md-1"><input class="form-control" name="term" placeholder="Term" value="1"></div>
        <div class="col-md-2"><input class="form-control" name="learner_id" placeholder="Learner ID" required></div>
        <div class="col-md-2"><input class="form-control" type="date" name="date_absent" required></div>
        <div class="col-md-1"><input class="form-control" name="reason_id" placeholder="Reason"></div>
        <div class="col-md-3"><input class="form-control" name="reason_other" placeholder="Reason text"></div>
        <div class="col-md-1"><button class="btn btn-primary w-100" type="submit">Save</button></div>
      </div>
    </form>
    <div id="attendance-msg" class="small mt-2"></div>
    <hr>
    <button id="load-attendance" class="btn btn-outline-secondary btn-sm mb-2">Reload Attendance</button>
    <div class="table-responsive">
      <table class="table table-sm table-striped"><thead><tr><th>Learner</th><th>Date</th><th>Grade</th><th>Class</th><th>Reason</th></tr></thead><tbody id="attendance-body"></tbody></table>
    </div>
  </div>
</div>
<script>
async function loadAttendance() {
  const res = await fetch("{{ url_for('api_teacher_attendance') }}");
  if (!res.ok) return;
  const data = await res.json();
  const rows = data.rows || [];
  document.getElementById("attendance-body").innerHTML = rows.map(r => `<tr><td>${r.Learnerid ?? ""}</td><td>${r.DateAbsent ?? ""}</td><td>${r.Grade ?? ""}</td><td>${r.Class ?? ""}</td><td>${r.ReasonOther ?? ""}</td></tr>`).join("");
}
document.getElementById("attendance-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  fd.set("idempotency_key", crypto.randomUUID());
  const res = await fetch("{{ url_for('api_teacher_attendance_save') }}", {method:"POST", body:fd});
  const data = await res.json();
  document.getElementById("attendance-msg").textContent = data.message || data.error || "Done";
  if (res.ok) loadAttendance();
});
document.getElementById("load-attendance").addEventListener("click", loadAttendance);
loadAttendance();
</script>
{% endblock %}
