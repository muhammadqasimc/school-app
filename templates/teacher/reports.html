{% extends "base.html" %}
{% block title %}Teacher Reports{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h4 class="mb-0">Reports</h4></div>
  <div class="card-body">
    <div class="row g-2 mb-2">
      <div class="col-md-2"><input id="r-year" class="form-control" value="2026" placeholder="Year"></div>
      <div class="col-md-2"><input id="r-grade" class="form-control" placeholder="Grade"></div>
      <div class="col-md-2"><input id="r-class" class="form-control" placeholder="Class"></div>
      <div class="col-md-2"><button id="open-report" class="btn btn-primary w-100">Export CSV</button></div>
    </div>
    <div class="small text-muted">Includes assignment/scope counts and attendance, discipline, and assessment record totals.</div>
  </div>
</div>
<script>
document.getElementById("open-report").addEventListener("click", () => {
  const p = new URLSearchParams();
  const y = document.getElementById("r-year").value.trim();
  const g = document.getElementById("r-grade").value.trim();
  const c = document.getElementById("r-class").value.trim();
  if (y) p.set("academic_year", y);
  if (g) p.set("grade", g);
  if (c) p.set("class_id", c);
  window.location.href = "{{ url_for('api_teacher_reports_export') }}?" + p.toString();
});
</script>
{% endblock %}
