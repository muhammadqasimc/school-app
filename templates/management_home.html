{% extends "base.html" %}

{% block title %}Management Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0"><i class="fas fa-chart-line"></i> Management Home Dashboard</h3>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-header">
    <h5 class="mb-0">Management Reports</h5>
  </div>
  <div class="card-body">
    <div class="row g-3">
      {% for report in reports %}
      <div class="col-md-6 col-lg-4">
        <a class="text-decoration-none" href="{{ url_for('management_report', report_key=report.key) }}">
          <div class="border rounded p-3 h-100 bg-light">
            <h6 class="mb-2 text-dark">{{ report.title }}</h6>
            <div class="small text-muted">Open live dashboard view</div>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
